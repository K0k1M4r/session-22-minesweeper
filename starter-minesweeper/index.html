<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Defuse the Grid: Minesweeper Logic</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="window">
        <!-- Optional Title Bar -->
        <div class="title-bar">
            <span class="title-text">Session 22: Minesweeper Lab</span>
        </div>

        <div class="game-container">
            <div class="status-bar">
                <div class="counter" id="mines-display">010</div>
                <button id="reset-button" class="smiley" aria-label="Reset game">🙂</button>
                <div class="counter" id="score-display">000</div>
            </div>

            <div id="grid-wrapper">
                <div id="grid" class="grid">
                    <!-- Grid generated by Engine -->
                </div>
            </div>

        </div>
        <div class="footer-note">Complete the functions in <b>core-logic.js</b> to play</div>
    </div>

    <!-- Student writes these core functions -->
    <script src="core-logic.js"></script>
    <!-- The engine uses the student's functions to run the game -->
    <script src="engine.js"></script>
</body>

</html>
